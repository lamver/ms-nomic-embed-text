services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server
    # ... все твои настройки llama-server ...

  # ИСПРАВЛЕНИЕ: Блок должен быть строго внутри services и выровнен по левому краю с llama-server
  ollama-em:
    image: ollama/ollama:latest
    container_name: ollama-em
    ports:
      - "127.0.0.1:11434:11434"
    expose:
      - "11434"
    volumes:
      - ./ollama_data:/root/.ollama
    entrypoint: >
      sh -c "
      ollama serve & 
      sleep 5; 
      echo 'Загрузка модели nomic-embed-text...';
      ollama run nomic-embed-text; 
      echo 'Модель успешно загружена!';
      wait
      "
    restart: unless-stopped