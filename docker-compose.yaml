services:
  llama-server:
    image: 'ghcr.io/ggml-org/llama.cpp:server'
    # ... все твои прошлые настройки llama-server остаются тут ...

  ollama-em:
    image: 'ollama/ollama:latest'
    container_name: ollama-em
    ports:
      - '127.0.0.1:11434:11434'
    expose:
      - '11434'
    volumes:
      - './ollama_data:/root/.ollama'
    entrypoint: >
      sh -c "
      ollama serve & 
      sleep 5; 
      ollama pull nomic-embed-text; 
      ollama pull bge-m3;
      wait
      "
    restart: unless-stopped